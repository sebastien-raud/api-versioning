<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Démo API Versioning</title>
    <!-- Highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/10.7.1/styles/github.min.css" />
    <!-- Diff2Html CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css" />
    <!-- Diff2Html JS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html-ui.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            margin-bottom: 10px;
            font-size: 32px;
        }

        header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .section {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
        }

        .section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 150px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .history-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            margin-bottom: 10px;
            background: #f9f9f9;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }

        .history-item.selected {
            background: #e8f0fe;
            border-color: #667eea;
        }

        .history-item-hash {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-weight: 600;
            color: #667eea;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .history-item-author {
            color: #666;
            font-size: 13px;
            margin-bottom: 2px;
        }

        .history-item-message {
            color: #333;
            font-size: 13px;
            margin-top: 4px;
        }

        .history-item-date {
            color: #999;
            font-size: 11px;
            margin-top: 4px;
        }

        .diff-container {
            max-height: 500px;
            overflow-y: auto;
            background: #f5f5f5;
            border-radius: 4px;
            padding: 10px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            background: none;
            color: #666;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .input-row {
                grid-template-columns: 1fr;
            }
        }

        .footer {
            background: #f5f5f5;
            padding: 20px 30px;
            text-align: center;
            color: #666;
            font-size: 12px;
            border-top: 1px solid #e0e0e0;
        }

        .commit-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 600px) {
            .commit-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 API Versioning Demo</h1>
            <p>Gestion de contenu avec historique Git</p>
        </header>

        <div class="content">
            <!-- LEFT COLUMN: Commit Form -->
            <div>
                <div class="section">
                    <h2>✍️ Nouveau Commit</h2>
                    
                    <form id="commitForm">
                        <div class="input-row">
                            <div class="form-group">
                                <label for="repository">Référentiel *</label>
                                <input type="text" id="repository" name="repository" placeholder="ex: test-repos" value="test-repos" required>
                            </div>
                            <div class="form-group">
                                <label for="entity">Entité *</label>
                                <input type="text" id="entity" name="entity" placeholder="ex: article" value="article" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="name">Nom du fichier *</label>
                            <input type="text" id="name" name="name" placeholder="ex: mon-article.md" value="mon-article.md" required>
                        </div>

                        <div class="form-group">
                            <label for="content">Contenu *</label>
                            <textarea id="content" name="content" placeholder="Contenu du fichier..." required>Titre de l'article

Bla bla !
Bla **bla** trc fdsfds
dsq
dss ds *ds* **ds** 2325 dsq dsq dsq ! fsdf dsq</textarea>
                        </div>

                        <div class="input-row">
                            <div class="form-group">
                                <label for="author">Auteur *</label>
                                <input type="text" id="author" name="author" placeholder="Jean Dupont" value="Jean Dupont" required>
                            </div>
                            <div class="form-group">
                                <label for="email">Email *</label>
                                <input type="email" id="email" name="email" placeholder="jean@example.com" value="jean@example.com" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="message">Message de commit (optionnel)</label>
                            <input type="text" id="message" name="message" placeholder="Description du changement...">
                        </div>

                        <div class="commit-buttons">
                            <button type="submit">💾 Envoyer un commit</button>
                            <button type="reset">🔄 Réinitialiser</button>
                        </div>

                        <div id="commitStatus" class="status"></div>
                    </form>
                </div>
            </div>

            <!-- RIGHT COLUMN: History & Diff -->
            <div>
                <div class="section">
                    <h2>📖 Historique et Différences</h2>

                    <div class="tabs">
                        <button class="tab active" data-tab="history">Historique</button>
                        <button class="tab" data-tab="diff">Diff</button>
                    </div>

                    <!-- History Tab -->
                    <div id="history" class="tab-content active">
                        <div class="form-group">
                            <label for="historyRepository">Référentiel</label>
                            <input type="text" id="historyRepository" placeholder="ex: test-repos" value="test-repos">
                        </div>

                        <div class="input-row">
                            <div class="form-group">
                                <label for="historyEntity">Entité</label>
                                <input type="text" id="historyEntity" placeholder="ex: article" value="article">
                            </div>
                            <div class="form-group">
                                <label for="historyName">Nom du fichier</label>
                                <input type="text" id="historyName" placeholder="ex: mon-article.md" value="mon-article.md">
                            </div>
                        </div>

                        <button onclick="loadHistory()">📂 Charger l'historique</button>

                        <div id="historyStatus" class="status"></div>
                        <div id="historyList" class="history-list"></div>
                    </div>

                    <!-- Diff Tab -->
                    <div id="diff" class="tab-content">
                        <div class="form-group">
                            <label for="diffRepository">Référentiel</label>
                            <input type="text" id="diffRepository" placeholder="ex: test-repos" value="test-repos">
                        </div>

                        <div class="input-row">
                            <div class="form-group">
                                <label for="diffEntity">Entité</label>
                                <input type="text" id="diffEntity" placeholder="ex: article" value="article">
                            </div>
                            <div class="form-group">
                                <label for="diffName">Nom du fichier</label>
                                <input type="text" id="diffName" placeholder="ex: mon-article.md" value="mon-article.md">
                            </div>
                        </div>

                        <div class="input-row">
                            <div class="form-group">
                                <label for="commit1">Premier commit (hash)</label>
                                <input type="text" id="commit1" placeholder="ex: abc123d">
                            </div>
                            <div class="form-group">
                                <label for="commit2">Deuxième commit (hash)</label>
                                <input type="text" id="commit2" placeholder="ex: def456e">
                            </div>
                        </div>

                        <button onclick="loadDiff()">🔍 Charger la différence</button>

                        <div id="diffStatus" class="status"></div>
                        <div id="diffContainer" class="diff-container"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>💡 Astuce : Les hashes de commit s'affichent dans l'onglet Historique. Cliquez sur les commits pour comparer.</p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000'; // Adapter selon le port de l'API

        // ========== Commit Form Handler ==========
        document.getElementById('commitForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const statusEl = document.getElementById('commitStatus');
            statusEl.textContent = '⏳ Envoi du commit...';
            statusEl.className = 'status loading';

            try {
                const repository = document.getElementById('repository').value;
                const payload = {
                    entity: document.getElementById('entity').value,
                    entity_id: Math.floor(Math.random() * 1000), // ID aléatoire
                    name: document.getElementById('name').value,
                    content: document.getElementById('content').value,
                    content_type: 'text',
                    author: document.getElementById('author').value,
                    author_email: document.getElementById('email').value,
                    message: document.getElementById('message').value || 'Mise à jour du contenu'
                };

                const response = await fetch(`${API_BASE}/commit/${repository}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok || response.status === 202) {
                    statusEl.textContent = `✅ Commit enqueué ! Job ID: ${data.jobId}`;
                    statusEl.className = 'status success';
                    document.getElementById('commitForm').reset();
                } else {
                    statusEl.textContent = `❌ Erreur: ${data.error || 'Erreur inconnue'}`;
                    statusEl.className = 'status error';
                }
            } catch (error) {
                statusEl.textContent = `❌ Erreur: ${error.message}`;
                statusEl.className = 'status error';
            }
        });

        // ========== Tab Navigation ==========
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                const tabName = e.target.dataset.tab;
                
                // Update active tab
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');

                // Update active content
                document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                document.getElementById(tabName).classList.add('active');
            });
        });

        // ========== History Loader ==========
        async function loadHistory() {
            const statusEl = document.getElementById('historyStatus');
            const listEl = document.getElementById('historyList');
            
            statusEl.textContent = '⏳ Chargement de l\'historique...';
            statusEl.className = 'status loading';
            listEl.innerHTML = '';

            try {
                const repository = document.getElementById('historyRepository').value;
                const entity = document.getElementById('historyEntity').value;
                const name = document.getElementById('historyName').value;

                const response = await fetch(`${API_BASE}/history/${repository}/${entity}/${name}`);
                const data = await response.json();

                if (response.ok && data.all && data.all.length > 0) {
                    statusEl.textContent = `✅ Historique chargé: ${data.total} commits trouvés`;
                    statusEl.className = 'status success';

                    data.all.forEach((commit, index) => {
                        const item = document.createElement('div');
                        item.className = 'history-item';
                        item.innerHTML = `
                            <div class="history-item-hash">${commit.hash.substring(0, 7)}</div>
                            <div class="history-item-author">${commit.author_name}</div>
                            <div class="history-item-message">${commit.message || '(sans message)'}</div>
                            <div class="history-item-date">${new Date(commit.authored_date).toLocaleDateString('fr-FR')}</div>
                        `;
                        
                        // Store hash for later use
                        item.dataset.hash = commit.hash;
                        item.dataset.date = commit.authored_date;
                        
                        item.addEventListener('click', () => {
                            document.querySelectorAll('.history-item').forEach(el => el.classList.remove('selected'));
                            item.classList.add('selected');
                            
                            // Auto-fill commit hashes in diff section if available
                            const historyItems = Array.from(document.querySelectorAll('.history-item'));
                            const selectedIndex = historyItems.indexOf(item);
                            
                            if (selectedIndex < historyItems.length - 1) {
                                document.getElementById('commit1').value = commit.hash.substring(0, 7);
                                document.getElementById('commit2').value = historyItems[selectedIndex + 1].dataset.hash.substring(0, 7);
                                document.getElementById('diffRepository').value = repository;
                                document.getElementById('diffEntity').value = entity;
                                document.getElementById('diffName').value = name;
                            }
                        });
                        
                        listEl.appendChild(item);
                    });
                } else {
                    statusEl.textContent = '❌ Aucun historique trouvé';
                    statusEl.className = 'status error';
                    listEl.innerHTML = '<div class="empty-state">Aucun commit disponible pour ce fichier</div>';
                }
            } catch (error) {
                statusEl.textContent = `❌ Erreur: ${error.message}`;
                statusEl.className = 'status error';
                listEl.innerHTML = '<div class="empty-state">Erreur lors du chargement</div>';
            }
        }

        // ========== Diff Loader ==========
        async function loadDiff() {
            const statusEl = document.getElementById('diffStatus');
            const containerEl = document.getElementById('diffContainer');
            
            statusEl.textContent = '⏳ Chargement de la différence...';
            statusEl.className = 'status loading';
            containerEl.innerHTML = '';

            try {
                const repository = document.getElementById('diffRepository').value;
                const entity = document.getElementById('diffEntity').value;
                const name = document.getElementById('diffName').value;
                const commit1 = document.getElementById('commit1').value;
                const commit2 = document.getElementById('commit2').value;

                if (!commit1 || !commit2) {
                    statusEl.textContent = '❌ Veuillez entrer deux hashes de commit';
                    statusEl.className = 'status error';
                    return;
                }

                const response = await fetch(`${API_BASE}/diff/${repository}/${entity}/${name}/${commit1}/${commit2}`);
                const data = await response.json();

                if (response.ok && data.diff) {
                    statusEl.textContent = '✅ Différence chargée';
                    statusEl.className = 'status success';

                    // Use Diff2Html to display the diff
                    const configuration = {
                        drawFileList: true,
                        fileListToggle: false,
                        fileListStartVisible: false,
                        fileContentToggle: false,
                        matching: 'lines',
                        outputFormat: 'side-by-side',
                        synchronisedScroll: true,
                        highlight: true,
                        renderNothingWhenEmpty: false,
                    };
                    
                    const diff2htmlUi = new Diff2HtmlUI(containerEl, data.diff, configuration);
                    diff2htmlUi.draw();
                    diff2htmlUi.highlightCode();
                } else {
                    statusEl.textContent = `❌ Erreur: ${data.error || 'Impossible de charger le diff'}`;
                    statusEl.className = 'status error';
                    containerEl.innerHTML = '<div class="empty-state">Impossible de charger la différence</div>';
                }
            } catch (error) {
                statusEl.textContent = `❌ Erreur: ${error.message}`;
                statusEl.className = 'status error';
                containerEl.innerHTML = '<div class="empty-state">Erreur lors du chargement</div>';
            }
        }
    </script>
</body>
</html>
